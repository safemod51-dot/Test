        // ฟังก์ชันช่วยในการสลับการแสดงข้อความ
        function displayMessage(id) {
            document.querySelectorAll('.msg').forEach(el => el.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        async function main() {
            displayMessage('loadingMsg');
            
            try {


                          // *** 1. สำคัญ: แก้ไข "LIFF ID 2007236505-Lbr300GA ของนักเรียนให้ถูกต้อง " ***

                await liff.init({ liffId: "2007236505-SJlLpqIz" });  

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                
                // ตรวจสอบความพร้อมของ API แชร์
                if (!liff.isApiAvailable("shareTargetPicker")) {
                    throw new Error("API shareTargetPicker ไม่รองรับ (โปรดเปิดในแอป LINE)");
                }

                document.getElementById("loadingMsg").style.display = "none";

                // เปิดตัวเลือกการแชร์
                const result = await liff.shareTargetPicker([flexMessage]);
                
                if (result) {
                    displayMessage('successMsg');
                    setTimeout(() => liff.closeWindow(), 2000);
                } else {
                    // ผู้ใช้กด 'ยกเลิก' การแชร์
                    liff.closeWindow();
                }

            } catch (err) {
                console.error("Share Error:", err);
                
                // แสดงข้อความ Error ที่ละเอียดขึ้น
                const errorMsgElement = document.getElementById('errorMsg');
                errorMsgElement.innerHTML = `❌ เกิดข้อผิดพลาดในการแชร์: <br> ${err.message || 'ไม่ทราบสาเหตุ'}`;
                
                displayMessage('errorMsg'); 
                setTimeout(() => liff.closeWindow(), 5000); 
            }
        }

        main();
